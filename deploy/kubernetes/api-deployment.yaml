apiVersion: apps/v1
kind: Deployment
metadata:
  name: raven-api
  namespace: raven-webmarket
  labels:
    app: raven-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: raven-api
  template:
    metadata:
      labels:
        app: raven-api
    spec:
      containers:
        - name: api
          image: raven-webmarket/api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: raven-env
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: raven-api
  namespace: raven-webmarket
spec:
  selector:
    app: raven-api
  ports:
    - port: 8080
      targetPort: 8080
