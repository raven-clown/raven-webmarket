apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: raven-api-hpa
  namespace: raven-webmarket
  labels:
    app: raven-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: raven-api
  minReplicas: 3
  maxReplicas: 16
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 55
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65
