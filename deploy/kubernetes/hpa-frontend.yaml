apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: raven-frontend-hpa
  namespace: raven-webmarket
  labels:
    app: raven-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: raven-frontend
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 55
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65
