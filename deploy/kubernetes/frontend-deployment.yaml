apiVersion: apps/v1
kind: Deployment
metadata:
  name: raven-frontend
  labels:
    app: raven-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: raven-frontend
  template:
    metadata:
      labels:
        app: raven-frontend
    spec:
      containers:
        - name: frontend
          image: raven-webmarket/frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: raven-env
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: raven-frontend
spec:
  selector:
    app: raven-frontend
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: raven-frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: raven-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 60
